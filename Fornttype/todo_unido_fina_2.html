<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanClub - Premium Experience</title>

<style>
:root{
--neon-cyan:#00f3ff;
--neon-purple:#bc13fe;
--dark-bg:#050505;
--mesa-red:#ff3c3c;
--mesa-yellow:#ffec3d;
--mesa-orange:#ff913d;
--mesa-blue:#3d9dff;
--mesa-teal:#3dffec;
}

body{
font-family:'Lexend',sans-serif;
margin:0;
color:white;
display:flex;
justify-content:center;
/* FONDO RESTAURADO */
background: linear-gradient(rgba(0, 0, 0, 0.37),rgba(0,0,0,0.6)), url("planclub2.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
min-height:100vh;
overflow-x:hidden;
}

.watermark-bg{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-30deg);
font-size:8rem;
font-weight:900;
color:rgba(255,255,255,0.02);
z-index:-1;
pointer-events:none;
}

/* RUEDITA NEÓN */
.settings-container {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000;
}

.btn-settings {
    background: rgba(0, 0, 0, 0);
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-size: 1.5rem;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    cursor: pointer;
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
}

.btn-settings:hover { transform: rotate(90deg); box-shadow: 0 0 20px var(--neon-cyan); }

.settings-menu {
    position: absolute;
    top: 55px;
    left: 0;
    background: rgba(10, 10, 10, 0.98);
    border: 1px solid var(--neon-cyan);
    border-radius: 15px;
    width: 210px;
    display: none;
    flex-direction: column;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    overflow: hidden;
}

.settings-menu button {
    background: none;
    border: none;
    color: white;
    padding: 15px;
    text-align: left;
    cursor: pointer;
    font-size: 0.9rem;
    border-bottom: 1px solid #222;
    width: 100%;
}

.settings-menu button:hover { background: rgba(0, 243, 255, 0.1); color: var(--neon-cyan); }

.app-container{
width:100%;
max-width:480px;
min-height:100vh;
padding:20px;
box-sizing:border-box;
position:relative;
}

header{ text-align:center; padding:40px 0 20px 0; }

/* ANIMACIÓN DEL LOGO */
@keyframes flotar {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

.logo {
font-size: 3rem;
font-weight: 900;
background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
/* Definición completa para evitar errores de validación */
-webkit-background-clip: text;
background-clip: text;
-webkit-text-fill-color: transparent;
color: transparent; 
margin: 0;
filter: drop-shadow(0 0 10px rgba(0, 243, 255, 0.3));
display: inline-block;
transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
cursor: default;
animation: flotar 3s ease-in-out infinite;
}

.logo:hover { transform: scale(1.15); }

.view{display:none;}
.view.active{ display:block; animation:fadeIn .4s ease; }

@keyframes fadeIn{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}

.menu-btn{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
color:white;
padding:25px;
margin:15px 0;
border-radius:20px;
width:100%;
font-size:1.1rem;
font-weight:bold;
cursor:pointer;
display:flex;
align-items:center;
justify-content:space-between;
transition:.3s;
backdrop-filter:blur(10px);
}

.menu-btn:hover{ border-color:var(--neon-cyan); background:rgba(255,255,255,0.15); transform:translateY(-3px); }

.card{
background:rgba(0,0,0,0.85);
padding:25px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
margin-bottom:20px;
}

input,.btn-action{
width:100%;
padding:18px;
margin:10px 0;
border-radius:14px;
border:1px solid #333;
background:#0d0d0d;
color:white;
box-sizing:border-box;
}

.btn-action{
background:linear-gradient(90deg,var(--neon-purple),#7a12f5);
border:none;
font-weight:bold;
cursor:pointer;
color: white;
}

.btn-back{ background:none; border:none; color:var(--neon-cyan); cursor:pointer; margin-bottom:15px; font-weight: bold; font-size: 1rem;}

.plano-container{
margin:20px auto; border:1px solid rgba(255,255,255,0.2); padding:10px; background:rgba(0,0,0,0.9); border-radius:15px; max-width:380px;
}
.grid-layout{ display:grid; grid-template-columns:repeat(6,1fr); grid-template-rows:repeat(8,45px); gap:8px; }
.dj-set{ grid-row:span 2; grid-column:3 / 5; background:#111; border:1px solid #444; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:.8rem; }
.mesa{ border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:bold; color:black; cursor:pointer; transition:.2s; }
.mesa.selected{ transform:scale(1.15); box-shadow:0 0 15px white; border:2px solid white; z-index:5; }
.m-r{background:var(--mesa-red);} .m-y{background:var(--mesa-yellow);} .m-o{background:var(--mesa-orange);} .m-b{background:var(--mesa-blue);} .m-t{background:var(--mesa-teal);}

.metodo-pago{ background:#0d0d0d; border:1px solid #333; padding:18px; border-radius:15px; margin:12px 0; display:flex; align-items:center; cursor:pointer; }
.metodo-pago.active{ border-color:var(--neon-cyan); background:rgba(0, 243, 255, 0.05); }
</style>
</head>

<body>

<div class="watermark-bg">PLANCLUB</div>

<div class="settings-container">
    <button class="btn-settings" onclick="toggleSettings()">⚙️</button>
    <div id="settings-menu" class="settings-menu">
        <button onclick="window.location.href='https://kenimarquines-cyber.github.io/PLAN/'">👤 Ver mi Perfil</button>
        <button onclick="alert('Opción: Cambiar Datos Personales')">✏️ Cambiar Datos</button>
        <button onclick="alert('Opción: Cerrar Sesión')">🚪 Cerrar Sesión</button>
    </div>
</div>

<div class="app-container">

<div id="view-home" class="view active">
<header>
<div class="logo">PLANCLUB</div>
<p style="color:#aaa;letter-spacing:2px; margin-top: 10px;">EXCLUSIVE ACCESS</p>
</header>
<button class="menu-btn" onclick="showView('form')"><span>✨ Nueva Reserva</span><span>→</span></button>
<button class="menu-btn" onclick="showView('list')"><span>📅 Mis Reservas</span><span>→</span></button>
<button class="menu-btn" style="margin-top:20px;" onclick="window.location.href='https://kenimarquines-cyber.github.io/INICIO/'">
    <span>🏠 Volver al Inicio</span><span>→</span>
</button>
</div>

<div id="view-form" class="view">
<button class="btn-back" onclick="showView('home')">← Volver al Inicio</button>
<div class="card">
<h3>Tus Datos</h3>
<input type="text" id="nombre" placeholder="Nombre completo">
<input type="date" id="fecha">
<input type="number" id="personas" placeholder="Cantidad de personas">
<button class="btn-action" onclick="confirmarDatos()">Ver Disponibilidad</button>
</div>
</div>

<div id="view-map" class="view">
<button class="btn-back" onclick="showView('form')">← Editar Datos</button>
<div style="text-align:center;"><small>Toca las mesas para seleccionar</small></div>
<div class="plano-container"><div class="grid-layout" id="mapa-grid"></div></div>
<div id="map-info" class="card" style="display:none;text-align:center;">
<p id="txt-mesas" style="color:var(--neon-cyan);font-weight:bold;"></p>
<h2 id="txt-total"></h2>
<button class="btn-action" onclick="showView('pago')">Proceder al Pago</button>
</div>
</div>

<div id="view-pago" class="view">
<button class="btn-back" onclick="showView('map')">← Cambiar Mesas</button>
<div class="card">
<h2 style="color:var(--neon-purple);text-align:center;">Finalizar Compra</h2>
<div id="resumen-pago" style="font-size:.9rem;border-bottom:1px solid #333;padding-bottom:15px;margin-bottom:15px;"></div>
<p>Método de pago:</p>
<div class="metodo-pago active" onclick="selectPay(this)"><input type="radio" name="pay" checked> 💳 Tarjeta / Débito</div>
<div class="metodo-pago" onclick="selectPay(this)"><input type="radio" name="pay"> 📱 Nequi / Daviplata</div>
<button class="btn-action" style="background:var(--neon-cyan);color:black;margin-top:20px;" onclick="finalizarPago()">CONFIRMAR Y PAGAR</button>
</div>
</div>

<div id="view-list" class="view">
<button class="btn-back" onclick="showView('home')">← Menú Principal</button>
<div id="reserva-container"></div>
</div>

</div>

<script>
let mesasSeleccionadas=[];
let tempUser={};
let dbReservas=JSON.parse(localStorage.getItem('planclub_db'))||[];

function toggleSettings() {
    const menu = document.getElementById('settings-menu');
    menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
}

window.onclick = function(event) {
    if (!event.target.matches('.btn-settings')) {
        document.getElementById('settings-menu').style.display = 'none';
    }
}

function showView(id){
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-'+id).classList.add('active');
    if(id==='map') renderMapa();
    if(id==='list') renderList();
    if(id==='pago'){
        document.getElementById('resumen-pago').innerHTML=`
            <b>Cliente:</b> ${tempUser.nombre}<br>
            <b>Mesas:</b> ${mesasSeleccionadas.join(', ')}<br>
            <b>Total:</b> $${(mesasSeleccionadas.length*40000).toLocaleString()} COP
        `;
    }
}

function selectPay(el){
    document.querySelectorAll('.metodo-pago').forEach(m=>m.classList.remove('active'));
    el.classList.add('active');
    el.querySelector('input').checked=true;
}

function confirmarDatos(){
    const n=document.getElementById('nombre').value;
    const f=document.getElementById('fecha').value;
    const p=document.getElementById('personas').value;
    if(n&&f&&p){ tempUser={nombre:n,fecha:f,personas:p}; showView('map'); }
    else alert("Por favor, completa tus datos.");
}

const configMesas=[
    {id:1,c:'m-r',g:'grid-row:8;grid-column:1;'}, {id:2,c:'m-r',g:'grid-row:7;grid-column:1;'},
    {id:3,c:'m-r',g:'grid-row:6;grid-column:1;'}, {id:4,c:'m-y',g:'grid-row:5;grid-column:1;'},
    {id:5,c:'m-y',g:'grid-row:4;grid-column:1;'}, {id:6,c:'m-y',g:'grid-row:3;grid-column:1;'},
    {id:7,c:'m-y',g:'grid-row:2;grid-column:1;'}, {id:8,c:'m-y',g:'grid-row:2;grid-column:2;'},
    {id:9,c:'m-y',g:'grid-row:2;grid-column:3;'}, {id:10,c:'m-y',g:'grid-row:2;grid-column:4;'},
    {id:11,c:'m-y',g:'grid-row:2;grid-column:5;'}, {id:12,c:'m-y',g:'grid-row:2;grid-column:6;'},
    {id:13,c:'m-y',g:'grid-row:3;grid-column:6;'}, {id:14,c:'m-y',g:'grid-row:4;grid-column:6;'},
    {id:15,c:'m-r',g:'grid-row:5;grid-column:6;'}, {id:16,c:'m-r',g:'grid-row:6;grid-column:6;'},
    {id:17,c:'m-r',g:'grid-row:7;grid-column:6;'}, {id:18,c:'m-o',g:'grid-row:4;grid-column:2;'},
    {id:19,c:'m-o',g:'grid-row:4;grid-column:5;'}, {id:20,c:'m-b',g:'grid-row:5;grid-column:3;'},
    {id:30,c:'m-b',g:'grid-row:5;grid-column:4;'}, {id:100,c:'m-t',g:'grid-row:6;grid-column:3;'},
    {id:101,c:'m-t',g:'grid-row:6;grid-column:4;'}
];

function renderMapa(){
    const grid=document.getElementById('mapa-grid');
    grid.innerHTML='<div class="dj-set">DJ</div>';
    configMesas.forEach(m=>{
        const div=document.createElement('div');
        div.className=`mesa ${m.c} ${mesasSeleccionadas.includes(m.id)?'selected':''}`;
        div.style=m.g; div.innerText=m.id;
        div.onclick=()=>{
            if(mesasSeleccionadas.includes(m.id)) mesasSeleccionadas=mesasSeleccionadas.filter(i=>i!==m.id);
            else mesasSeleccionadas.push(m.id);
            renderMapa();
        };
        grid.appendChild(div);
    });
    const info=document.getElementById('map-info');
    if(mesasSeleccionadas.length>0){
        info.style.display="block";
        document.getElementById('txt-mesas').innerText="Mesas: "+mesasSeleccionadas.join(', ');
        document.getElementById('txt-total').innerText="$"+(mesasSeleccionadas.length*40000).toLocaleString()+" COP";
    }else info.style.display="none";
}

function finalizarPago(){
    alert("¡Mesa reservada con éxito! 🥂");
    dbReservas.push({ id:Date.now(), ...tempUser, mesas:[...mesasSeleccionadas], total:mesasSeleccionadas.length*40000 });
    localStorage.setItem('planclub_db',JSON.stringify(dbReservas));
    mesasSeleccionadas=[];
    showView('home');
}

function renderList(){
    const container=document.getElementById('reserva-container');
    if(dbReservas.length===0){ container.innerHTML="<p style='text-align:center;'>No hay reservas.</p>"; return; }
    container.innerHTML=dbReservas.map(r=>`
        <div class="card" style="border-left:5px solid var(--neon-cyan);">
            <h4>Mesas: ${r.mesas.join(', ')}</h4>
            <p>${r.nombre} • $${r.total.toLocaleString()}</p>
        </div>
    `).join('');
}
</script>

</body>
</html>
