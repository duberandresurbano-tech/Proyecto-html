<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanClub - Premium Experience</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.07);
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            padding-bottom: 80px; /* Espacio para el menú inferior */
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .watermark-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 8rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.02);
            z-index: -1;
            pointer-events: none;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(188, 19, 254, 0.2);
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .container { max-width: 450px; margin: auto; padding: 20px; }

        /* Vistas */
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Mapa Arquitectónico */
        .plano-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: auto repeat(5, 60px);
            gap: 10px;
            background: #111;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 15px;
            position: relative;
        }

        .area-tarima { grid-column: span 4; background: linear-gradient(to right, #222, var(--neon-purple), #222); height: 40px; border-radius: 5px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 10px; }
        .area-barra { grid-row: span 3; background: #222; border-left: 4px solid var(--neon-cyan); display: flex; align-items: center; justify-content: center; font-size: 10px; writing-mode: vertical-rl; }
        .area-banos { background: #1a1a1a; font-size: 8px; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; }

        .mesa {
            background: #252525;
            border: 1px solid #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .mesa.ocupada { background: #311; border-color: #f44; color: #f44; cursor: not-allowed; }
        .mesa.selected { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); transform: scale(1.1); }

        /* Estilos de Tarjetas */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        input, button {
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px;
            border: 1px solid #333; background: #111; color: white; box-sizing: border-box;
        }

        .btn-primary { background: linear-gradient(90deg, var(--neon-purple), #7a12f5); border: none; font-weight: bold; cursor: pointer; }
        .btn-pay { background: var(--neon-cyan); color: black; border: none; font-weight: 900; }

        /* Menú Inferior */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid #222;
            backdrop-filter: blur(10px);
        }

        .nav-item { color: #666; font-size: 12px; text-decoration: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--neon-cyan); }

        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        .pending { background: #ffaa0022; color: #ffaa00; }
        .confirmed { background: #00ff8822; color: #00ff88; }
    </style>
</head>
<body>

    <div class="watermark-bg">PLANCLUB</div>

    <header>
        <div class="logo">PLANCLUB</div>
    </header>

    <div class="container">
        
        <div id="view-reserva" class="view active">
            <div class="card">
                <h3>Reserva tu Mesa</h3>
                <input type="text" id="nombre" placeholder="Nombre completo">
                <input type="date" id="fecha">
                <input type="number" id="personas" placeholder="Número de personas">
                <p style="font-size: 11px; color: #888; text-align: center;">Haz clic abajo para elegir ubicación en el plano</p>
                
                <div class="plano-bar">
                    <div class="area-tarima">STAGE / DJ SET</div>
                    <div class="area-barra">BANDA BARRA</div>
                    <div class="mesa" onclick="selMesa(this, 1)">M1</div>
                    <div class="mesa" onclick="selMesa(this, 2)">M2</div>
                    <div class="mesa ocupada">M3</div>
                    <div class="mesa" onclick="selMesa(this, 4)">M4</div>
                    <div class="mesa" onclick="selMesa(this, 5)">M5</div>
                    <div class="mesa" onclick="selMesa(this, 6)">M6</div>
                    <div class="mesa" onclick="selMesa(this, 7)">M7</div>
                    <div class="area-banos">W.C.</div>
                    <div class="mesa" onclick="selMesa(this, 8)">M8</div>
                    <div class="mesa" onclick="selMesa(this, 9)">M9</div>
                </div>

                <button class="btn-primary" style="margin-top: 15px;" onclick="crearSolicitud()">Solicitar Reservación</button>
            </div>
        </div>

        <div id="view-planes" class="view">
            <h3>Mis Planes</h3>
            <div id="lista-planes"></div>
        </div>

        <div id="view-pago" class="view">
            <div class="card" style="text-align: center;">
                <h2 style="color: var(--neon-cyan);">Confirmar y Pagar</h2>
                <div id="ticket-pago" style="text-align: left; font-size: 14px; line-height: 1.8; margin: 20px 0;"></div>
                <button class="btn-pay" onclick="procesarPagoFinal()">PAGAR COVER</button>
                <button style="background:none; border:none; color:#888;" onclick="cambiarVista('planes')">Cancelar</button>
            </div>
        </div>

    </div>

    <nav class="nav-bar">
        <div class="nav-item active" id="nav-reserva" onclick="cambiarVista('reserva')">
            <span>🏠</span>
            <span>Reservar</span>
        </div>
        <div class="nav-item" id="nav-planes" onclick="cambiarVista('planes')">
            <span>📅</span>
            <span>Mis Planes</span>
        </div>
    </nav>

    <script>
        let mesaSel = null;
        let pagoPendienteIdx = null;
        let misReservas = JSON.parse(localStorage.getItem('pc_reservas')) || [];

        function cambiarVista(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('view-' + id).classList.add('active');
            if(id === 'reserva' || id === 'planes') {
                document.getElementById('nav-' + id).classList.add('active');
            }
            if(id === 'planes') renderPlanes();
        }

        function selMesa(el, n) {
            if(el.classList.contains('ocupada')) return;
            document.querySelectorAll('.mesa').forEach(m => m.classList.remove('selected'));
            el.classList.add('selected');
            mesaSel = n;
        }

        function crearSolicitud() {
            const nom = document.getElementById('nombre').value;
            const fec = document.getElementById('fecha').value;
            const per = document.getElementById('personas').value;

            if(nom && fec && per && mesaSel) {
                const nueva = {
                    nombre: nom, fecha: fec, personas: per, mesa: mesaSel,
                    status: 'Pendiente', id: Date.now()
                };
                misReservas.push(nueva);
                localStorage.setItem('pc_reservas', JSON.stringify(misReservas));
                
                alert("Solicitud enviada. PlanClub revisará disponibilidad.");
                cambiarVista('planes');
                
                // Limpiar campos
                document.getElementById('nombre').value = '';
                mesaSel = null;
                document.querySelectorAll('.mesa').forEach(m => m.classList.remove('selected'));
            } else {
                alert("Por favor completa todos los datos y selecciona una mesa en el plano.");
            }
        }

        function renderPlanes() {
            const div = document.getElementById('lista-planes');
            if(misReservas.length === 0) {
                div.innerHTML = '<p style="text-align:center; color:#666;">No tienes planes registrados.</p>';
                return;
            }

            div.innerHTML = misReservas.map((r, i) => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div>
                            <span class="status-pill ${r.status === 'Pendiente' ? 'pending' : 'confirmed'}">
                                ${r.status.toUpperCase()}
                            </span>
                            <h4 style="margin: 10px 0 5px 0;">Reserva #${r.mesa}</h4>
                            <small style="color:#aaa;">${r.fecha} • ${r.personas} Personas</small>
                        </div>
                        ${r.status === 'Pendiente' ? 
                            `<button onclick="simularConfirmacion(${i})" style="width:auto; font-size:10px; padding:5px 10px;">(Beta: Confirmar)</button>` : 
                            `<button class="btn-pay" style="width:auto; padding:5px 15px;" onclick="irAPagar(${i})">PAGAR</button>`
                        }
                    </div>
                </div>
            `).join('');
        }

        function simularConfirmacion(idx) {
            misReservas[idx].status = 'Confirmada';
            localStorage.setItem('pc_reservas', JSON.stringify(misReservas));
            renderPlanes();
        }

        function irAPagar(idx) {
            pagoPendienteIdx = idx;
            const r = misReservas[idx];
            const total = r.personas * 35000;
            document.getElementById('ticket-pago').innerHTML = `
                <b>Evento:</b> Noche PlanClub Premium<br>
                <b>Mesa Reservada:</b> #${r.mesa}<br>
                <b>Cantidad de Personas:</b> ${r.personas}<br>
                <b>Titular:</b> ${r.nombre}
            `;
            document.getElementById('total-pago').innerText = `$${total.toLocaleString()} COP`;
            cambiarVista('pago');
        }

        function procesarPagoFinal() {
            alert("💸 Pago exitoso. ¡Tu mesa está lista para la fiesta!");
            misReservas.splice(pagoPendienteIdx, 1); // La quitamos de pendientes o la dejamos como "Completada"
            localStorage.setItem('pc_reservas', JSON.stringify(misReservas));
            cambiarVista('planes');
        }

    </script>
</body>
</html>
